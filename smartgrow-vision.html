<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a1a0f">
<title>SmartGrow · Análise Visual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a1a0f;
    --surface:  #111f14;
    --surface2: #162019;
    --green:    #4dff7c;
    --green-dim:#1a4d2a;
    --green-mid:#2d7a42;
    --text:     #e8f5ec;
    --text-sec: #7aad88;
    --text-ter: #3d6b4a;
    --border:   rgba(77,255,124,0.12);
    --border-strong: rgba(77,255,124,0.25);
    --red:      #ff4d6a;
    --amber:    #ffb347;
    --radius:   16px;
    --radius-sm:10px;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── SCREENS ── */
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; transition: opacity .3s, transform .3s; }
  .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }

  /* ── HEADER ── */
  .app-header {
    padding: env(safe-area-inset-top, 20px) 20px 0;
    padding-top: calc(env(safe-area-inset-top, 20px) + 16px);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 12px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .logo-text { font-size: 13px; font-weight: 700; letter-spacing: .15em; color: var(--green); text-transform: uppercase; }
  .plant-badge { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text-sec); background: var(--surface); border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px; }

  /* ── SCREEN 1: CAPTURE ── */
  #screen-capture { justify-content: space-between; padding-bottom: env(safe-area-inset-bottom, 20px); }

  .capture-area {
    flex: 1;
    margin: 16px 20px;
    border-radius: var(--radius);
    border: 1.5px dashed var(--border-strong);
    position: relative;
    overflow: hidden;
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: border-color .2s;
  }
  .capture-area:active { border-color: var(--green); }
  .capture-area img { width: 100%; height: 100%; object-fit: cover; }
  .capture-area video { width: 100%; height: 100%; object-fit: cover; }

  .capture-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    padding: 40px;
  }
  .capture-icon { width: 64px; height: 64px; border-radius: 50%; border: 1.5px solid var(--border-strong); display: flex; align-items: center; justify-content: center; }
  .capture-label { font-size: 14px; color: var(--text-sec); text-align: center; line-height: 1.5; }
  .capture-sub { font-size: 11px; color: var(--text-ter); text-align: center; font-family: 'DM Mono', monospace; }

  .capture-overlay {
    position: absolute; inset: 0;
    display: none; align-items: center; justify-content: center;
    background: rgba(10,26,15,.7);
  }
  .capture-overlay.show { display: flex; }

  /* Corner brackets */
  .brackets { position: absolute; inset: 20px; pointer-events: none; }
  .bracket { position: absolute; width: 24px; height: 24px; border-color: var(--green); border-style: solid; opacity: .6; }
  .bracket.tl { top:0; left:0; border-width: 2px 0 0 2px; }
  .bracket.tr { top:0; right:0; border-width: 2px 2px 0 0; }
  .bracket.bl { bottom:0; left:0; border-width: 0 0 2px 2px; }
  .bracket.br { bottom:0; right:0; border-width: 0 2px 2px 0; }

  /* Plant selector */
  .plant-selector {
    display: flex; gap: 8px; padding: 0 20px 12px;
    flex-shrink: 0;
  }
  .plant-btn {
    flex: 1; padding: 10px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text-sec); font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all .2s; text-align: center;
  }
  .plant-btn.ativo { border-color: var(--green); color: var(--green); background: var(--green-dim); }

  /* Action buttons */
  .action-row {
    display: flex; gap: 10px; padding: 0 20px;
    padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 12px);
    flex-shrink: 0;
  }
  .btn-cam {
    width: 56px; height: 56px; border-radius: 50%;
    border: 1.5px solid var(--border-strong); background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; transition: all .2s;
  }
  .btn-cam:active { background: var(--green-dim); border-color: var(--green); }
  .btn-analisar {
    flex: 1; height: 56px; border-radius: 28px;
    background: var(--green); color: #0a1a0f;
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800;
    border: none; cursor: pointer; letter-spacing: .05em;
    transition: opacity .2s; text-transform: uppercase;
  }
  .btn-analisar:disabled { opacity: .3; cursor: not-allowed; }
  .btn-analisar:active:not(:disabled) { opacity: .8; }

  /* Hidden inputs */
  #input-camera { display: none; }
  #input-galeria { display: none; }

  /* ── SCREEN 2: ANALYZING ── */
  #screen-analyzing { align-items: center; justify-content: center; gap: 24px; }

  .scan-container { position: relative; width: 220px; height: 220px; }
  .scan-img { width: 220px; height: 220px; border-radius: var(--radius); object-fit: cover; }
  .scan-line {
    position: absolute; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    top: 0; animation: scan 2s ease-in-out infinite;
    box-shadow: 0 0 12px var(--green);
  }
  @keyframes scan { 0%{top:0} 50%{top:calc(100% - 2px)} 100%{top:0} }
  .scan-border { position: absolute; inset: 0; border: 1.5px solid var(--green); border-radius: var(--radius); opacity: .5; }

  .analyzing-label { font-size: 13px; color: var(--text-sec); font-family: 'DM Mono', monospace; letter-spacing: .1em; text-align: center; }
  .analyzing-step { font-size: 11px; color: var(--text-ter); font-family: 'DM Mono', monospace; text-align: center; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── SCREEN 3: RESULT ── */
  #screen-result { overflow: hidden; }

  .result-scroll {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    -webkit-overflow-scrolling: touch;
  }
  .result-scroll::-webkit-scrollbar { display: none; }

  .result-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .result-title { font-size: 20px; font-weight: 800; }
  .result-ts { font-size: 10px; color: var(--text-ter); font-family: 'DM Mono', monospace; }

  /* Status badge */
  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
    margin-bottom: 16px;
  }
  .status-otimo  { background: rgba(77,255,124,.15); color: var(--green); border: 1px solid rgba(77,255,124,.3); }
  .status-bom    { background: rgba(77,255,124,.08); color: #a0e8b0; border: 1px solid rgba(77,255,124,.2); }
  .status-atencao{ background: rgba(255,179,71,.12); color: var(--amber); border: 1px solid rgba(255,179,71,.3); }
  .status-critico{ background: rgba(255,77,106,.12); color: var(--red); border: 1px solid rgba(255,77,106,.3); }

  /* Thumb + status row */
  .result-top { display: flex; gap: 14px; margin-bottom: 16px; align-items: flex-start; }
  .result-thumb { width: 80px; height: 80px; border-radius: var(--radius-sm); object-fit: cover; flex-shrink: 0; border: 1px solid var(--border); }

  /* Fields grid */
  .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .field-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
  .field-lbl { font-size: 9px; color: var(--text-ter); text-transform: uppercase; letter-spacing: .1em; font-family: 'DM Mono', monospace; margin-bottom: 4px; }
  .field-val { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }

  /* Observações */
  .obs-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 16px; }
  .obs-title { font-size: 10px; color: var(--text-ter); text-transform: uppercase; letter-spacing: .1em; font-family: 'DM Mono', monospace; margin-bottom: 8px; }
  .obs-text { font-size: 13px; color: var(--text-sec); line-height: 1.6; }

  /* Sinais */
  .sinais-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .sinal-tag { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-family: 'DM Mono', monospace; }
  .sinal-ok  { background: var(--green-dim); color: var(--green); border: 1px solid rgba(77,255,124,.2); }
  .sinal-alert { background: rgba(255,179,71,.1); color: var(--amber); border: 1px solid rgba(255,179,71,.2); }
  .sinal-crit{ background: rgba(255,77,106,.1); color: var(--red); border: 1px solid rgba(255,77,106,.2); }

  /* Result action */
  .result-actions { display: flex; gap: 10px; padding: 12px 20px; padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 12px); flex-shrink: 0; }
  .btn-refazer { flex: 1; height: 50px; border-radius: 25px; border: 1.5px solid var(--border-strong); background: transparent; color: var(--text-sec); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-enviar  { flex: 2; height: 50px; border-radius: 25px; background: var(--green); color: #0a1a0f; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: .05em; transition: opacity .2s; }
  .btn-enviar:active { opacity: .8; }
  .btn-enviar.enviado { background: var(--green-mid); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: calc(env(safe-area-inset-bottom, 20px) + 80px); left: 20px; right: 20px;
    background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm); padding: 12px 16px;
    font-size: 13px; color: var(--text-sec); text-align: center;
    transform: translateY(20px); opacity: 0; pointer-events: none;
    transition: all .3s; z-index: 99;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<!-- ══ SCREEN 1: CAPTURA ══ -->
<div class="screen" id="screen-capture">
  <div class="app-header">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">SmartGrow</span>
    </div>
    <span class="plant-badge" id="badge-planta">Planta 1</span>
  </div>

  <!-- Seletor de planta -->
  <div class="plant-selector" style="margin-top:14px">
    <button class="plant-btn ativo" onclick="selecionarPlanta(1)">🌿 Planta 1</button>
    <button class="plant-btn" onclick="selecionarPlanta(2)">🌿 Planta 2</button>
  </div>

  <!-- Área de captura -->
  <div class="capture-area" id="capture-area" onclick="abrirGaleria()">
    <div class="capture-placeholder" id="placeholder">
      <div class="capture-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M14 10v8M10 14h8" stroke="#4dff7c" stroke-width="1.5" stroke-linecap="round"/>
          <rect x="2" y="6" width="24" height="18" rx="3" stroke="#3d6b4a" stroke-width="1.5"/>
          <circle cx="22" cy="10" r="1.5" fill="#3d6b4a"/>
        </svg>
      </div>
      <p class="capture-label">Toque para selecionar<br>uma foto da galeria</p>
      <p class="capture-sub">ou use a câmera abaixo</p>
    </div>
    <img id="preview-img" style="display:none;width:100%;height:100%;object-fit:cover" alt="preview">
    <div class="brackets">
      <div class="bracket tl"></div>
      <div class="bracket tr"></div>
      <div class="bracket bl"></div>
      <div class="bracket br"></div>
    </div>
  </div>

  <!-- Botões de ação -->
  <div class="action-row">
    <button class="btn-cam" onclick="abrirCamera()" title="Câmera">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M1 8.5C1 7.4 1.9 6.5 3 6.5h1.5l1.5-2h8l1.5 2H19c1.1 0 2 .9 2 2v9c0 1.1-.9 2-2 2H3c-1.1 0-2-.9-2-2v-9z" stroke="#7aad88" stroke-width="1.4"/>
        <circle cx="11" cy="13" r="3" stroke="#7aad88" stroke-width="1.4"/>
      </svg>
    </button>
    <button class="btn-analisar" id="btn-analisar" disabled onclick="iniciarAnalise()">
      Analisar Planta
    </button>
  </div>

  <input type="file" id="input-camera"  accept="image/*" capture="environment" onchange="onFotoSelecionada(this)">
  <input type="file" id="input-galeria" accept="image/*" onchange="onFotoSelecionada(this)">
</div>

<!-- ══ SCREEN 2: ANALISANDO ══ -->
<div class="screen hidden" id="screen-analyzing">
  <div class="app-header">
    <div class="logo"><div class="logo-dot"></div><span class="logo-text">SmartGrow</span></div>
  </div>
  <div class="scan-container">
    <img id="scan-img" src="" alt="" class="scan-img">
    <div class="scan-line"></div>
    <div class="scan-border"></div>
  </div>
  <p class="analyzing-label">ANALISANDO PLANTA</p>
  <p class="analyzing-step" id="analyzing-step">Identificando estrutura foliar...</p>
</div>

<!-- ══ SCREEN 3: RESULTADO ══ -->
<div class="screen hidden" id="screen-result">
  <div class="app-header" style="flex-shrink:0">
    <div class="logo"><div class="logo-dot"></div><span class="logo-text">SmartGrow</span></div>
    <span class="result-ts" id="result-ts"></span>
  </div>

  <div class="result-scroll">
    <div class="result-header">
      <p class="result-title" id="result-planta">Planta 1</p>
    </div>

    <div class="result-top">
      <img id="result-thumb" src="" alt="" class="result-thumb">
      <div>
        <div id="status-badge" class="status-badge status-bom">
          <span>●</span><span id="status-text">Bom</span>
        </div>
        <p style="font-size:12px;color:var(--text-sec);line-height:1.5" id="result-resumo"></p>
      </div>
    </div>

    <div class="fields-grid" id="fields-grid"></div>

    <div id="sinais-wrap"></div>

    <div class="obs-card">
      <p class="obs-title">Observações da IA</p>
      <p class="obs-text" id="obs-text"></p>
    </div>
  </div>

  <div class="result-actions">
    <button class="btn-refazer" onclick="voltarCaptura()">← Nova foto</button>
    <button class="btn-enviar" id="btn-enviar" onclick="enviarParaSistema()">Enviar ao Sistema</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const GAS_URL = "https://script.google.com/macros/s/AKfycby56nn56erEcdsAG06Rg5wnkjVYau9uWnO73KT0MjMzk7uPJYujvms41aMHNYtu0IHt-A/exec";

let plantaSelecionada = 1;
let imagemBase64 = null;
let imagemMimeType = "image/jpeg";
let resultadoAtual = null;

const steps = [
  "Identificando estrutura foliar...",
  "Analisando coloração das folhas...",
  "Verificando sinais de estresse...",
  "Contando nós e caules...",
  "Estimando fase de desenvolvimento...",
  "Gerando relatório técnico...",
];

// ── NAVEGAÇÃO ────────────────────────────────────────────
function mostrarTela(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

// ── SELEÇÃO DE PLANTA ────────────────────────────────────
function selecionarPlanta(n) {
  plantaSelecionada = n;
  document.querySelectorAll(".plant-btn").forEach((b,i) => b.classList.toggle("ativo", i===n-1));
  document.getElementById("badge-planta").textContent = `Planta ${n}`;
}

// ── FOTO ─────────────────────────────────────────────────
function abrirCamera()  { document.getElementById("input-camera").click(); }
function abrirGaleria() { document.getElementById("input-galeria").click(); }

function onFotoSelecionada(input) {
  const file = input.files[0];
  if (!file) return;
  imageMimeType = file.type || "image/jpeg";
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    imagemBase64 = dataUrl.split(",")[1];
    imagemMimeType = file.type;

    const img = document.getElementById("preview-img");
    img.src = dataUrl;
    img.style.display = "block";
    document.getElementById("placeholder").style.display = "none";
    document.getElementById("btn-analisar").disabled = false;
  };
  reader.readAsDataURL(file);
  input.value = "";
}

// ── ANÁLISE ───────────────────────────────────────────────
async function iniciarAnalise() {
  if (!imagemBase64) return;
  mostrarTela("screen-analyzing");

  // Mostra imagem no scanner
  document.getElementById("scan-img").src = `data:${imagemMimeType};base64,${imagemBase64}`;

  // Rotaciona steps
  let stepIdx = 0;
  const stepEl = document.getElementById("analyzing-step");
  const stepInterval = setInterval(() => {
    stepEl.textContent = steps[stepIdx % steps.length];
    stepIdx++;
  }, 1800);

  try {
    const prompt = `Você é um especialista em cultivo indoor de Cannabis sativa. Analise a foto desta planta e gere um relatório técnico completo e preciso.

Retorne APENAS um JSON válido sem markdown, com exatamente estes campos:

{
  "fase_visual": "muda | vegetação | floração | desconhecido",
  "altura_estimada_cm": número ou null,
  "numero_caules_principais": número,
  "numero_nos_visiveis": número ou null,
  "cor_folhas": "verde escuro | verde médio | verde claro | amarelado | outro",
  "deficiencia_detectada": "nenhuma | nitrogênio | fósforo | potássio | magnésio | ferro | outro",
  "deficiencia_descricao": "descrição breve ou vazio",
  "pragas_ou_doencas": true ou false,
  "pragas_descricao": "descrição ou vazio",
  "estado_geral": "ótimo | bom | atenção | crítico",
  "resumo": "frase de 1-2 linhas sobre o estado atual da planta",
  "observacoes": "parágrafo detalhado com observações técnicas, recomendações e pontos de atenção"
}`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: [
            {
              type: "image",
              source: { type: "base64", media_type: imagemMimeType, data: imagemBase64 }
            },
            { type: "text", text: prompt }
          ]
        }]
      })
    });

    clearInterval(stepInterval);
    const data = await response.json();
    const raw  = data.content[0].text;
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error("Resposta inválida da IA");
    resultadoAtual = JSON.parse(match[0]);
    exibirResultado(resultadoAtual);

  } catch (err) {
    clearInterval(stepInterval);
    mostrarTela("screen-capture");
    mostrarToast("Erro na análise: " + err.message);
  }
}

// ── EXIBIR RESULTADO ─────────────────────────────────────
function exibirResultado(r) {
  const agora = new Date();
  const ts = agora.toLocaleDateString("pt-BR") + " " + agora.toLocaleTimeString("pt-BR", {hour:"2-digit",minute:"2-digit"});

  document.getElementById("result-planta").textContent = `Planta ${plantaSelecionada}`;
  document.getElementById("result-ts").textContent = ts;
  document.getElementById("result-thumb").src = `data:${imagemMimeType};base64,${imagemBase64}`;
  document.getElementById("result-resumo").textContent = r.resumo || "";
  document.getElementById("obs-text").textContent = r.observacoes || "";

  // Status badge
  const badgeEl   = document.getElementById("status-badge");
  const statusMap  = {
    "ótimo":   ["status-otimo",   "Ótimo ✦"],
    "bom":     ["status-bom",     "Bom"],
    "atenção": ["status-atencao", "Atenção ⚠"],
    "crítico": ["status-critico", "Crítico ✕"],
  };
  const [cls, label] = statusMap[r.estado_geral] || ["status-bom", r.estado_geral];
  badgeEl.className = "status-badge " + cls;
  document.getElementById("status-text").textContent = label;

  // Fields grid
  const fields = [
    ["Fase visual",       r.fase_visual || "--"],
    ["Altura estimada",   r.altura_estimada_cm ? r.altura_estimada_cm + " cm" : "--"],
    ["Caules principais", r.numero_caules_principais ?? "--"],
    ["Nós visíveis",      r.numero_nos_visiveis ?? "--"],
    ["Cor das folhas",    r.cor_folhas || "--"],
    ["Deficiência",       r.deficiencia_detectada || "--"],
  ];
  document.getElementById("fields-grid").innerHTML = fields.map(([l,v]) => `
    <div class="field-card">
      <p class="field-lbl">${l}</p>
      <p class="field-val">${v}</p>
    </div>`).join("");

  // Sinais
  const sinais = [];
  if (!r.pragas_ou_doencas) sinais.push({t:"ok",  l:"Sem pragas"});
  else                       sinais.push({t:"crit",l:"Pragas: " + (r.pragas_descricao||"sim")});
  if (r.deficiencia_detectada === "nenhuma" || !r.deficiencia_detectada)
                             sinais.push({t:"ok",  l:"Sem deficiência"});
  else                       sinais.push({t:"alert",l:"Def: " + r.deficiencia_detectada});

  document.getElementById("sinais-wrap").innerHTML = `<div class="sinais-row">
    ${sinais.map(s=>`<span class="sinal-tag sinal-${s.t}">${s.l}</span>`).join("")}
  </div>`;

  mostrarTela("screen-result");
}

// ── ENVIAR AO SISTEMA ─────────────────────────────────────
async function enviarParaSistema() {
  if (!resultadoAtual) return;
  const btn = document.getElementById("btn-enviar");
  btn.textContent = "Enviando...";
  btn.disabled = true;

  const agora = new Date();
  const ts = agora.toLocaleDateString("pt-BR") + " " + agora.toLocaleTimeString("pt-BR", {hour:"2-digit",minute:"2-digit"});

  const descricao = JSON.stringify({
    ts,
    planta: plantaSelecionada,
    estado: resultadoAtual.estado_geral,
    fase:   resultadoAtual.fase_visual,
    altura: resultadoAtual.altura_estimada_cm,
    caules: resultadoAtual.numero_caules_principais,
    nos:    resultadoAtual.numero_nos_visiveis,
    cor:    resultadoAtual.cor_folhas,
    deficiencia: resultadoAtual.deficiencia_detectada,
    pragas: resultadoAtual.pragas_ou_doencas,
    resumo: resultadoAtual.resumo,
    obs:    resultadoAtual.observacoes,
  });

  try {
    await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        tipo:       "evento",
        evento:     `analise_visual_P${plantaSelecionada}`,
        descricao,
        fasePlanta: "vegetacao",
        diasCiclo:  0,
        hora:       agora.getHours(),
        minuto:     agora.getMinutes(),
      })
    });

    btn.textContent = "Enviado ✓";
    btn.classList.add("enviado");
    mostrarToast("Análise enviada ao SmartGrow!");
    setTimeout(voltarCaptura, 2000);

  } catch (err) {
    btn.textContent = "Enviar ao Sistema";
    btn.disabled = false;
    mostrarToast("Erro ao enviar: " + err.message);
  }
}

// ── UTILITÁRIOS ───────────────────────────────────────────
function voltarCaptura() {
  resultadoAtual = null;
  imagemBase64   = null;
  document.getElementById("preview-img").style.display = "none";
  document.getElementById("placeholder").style.display  = "flex";
  document.getElementById("btn-analisar").disabled = true;
  document.getElementById("btn-enviar").textContent = "Enviar ao Sistema";
  document.getElementById("btn-enviar").classList.remove("enviado");
  document.getElementById("btn-enviar").disabled = false;
  mostrarTela("screen-capture");
}

function mostrarToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}
</script>
